[package]
name = "azumi"
version = "45.1.4"
edition = "2021"
authors = ["DraconDev <dracsharp@gmail.com>"]
license-file = "LICENSE"
description = "Type-safe, compile-time HTML templating for Rust"
repository = "https://github.com/DraconDev/azumi"
keywords = ["html", "template", "macro", "web"]
categories = ["template-engine", "web-programming"]
readme = "README.md"

[workspace]
members = ["macros", "demo"]
resolver = "2"

[features]
default = []
schema = ["azumi-macros/schema"]
test-utils = ["dep:scraper"]
devtools = ["dep:notify", "tokio/sync"]

[dependencies]
azumi-macros = { version = "7.0", path = "macros" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
axum = { version = "0.7", features = ["ws"] }
inventory = "0.3"
scraper = { version = "0.18", optional = true }
hmac = "0.12"
sha2 = "0.10"
base64 = "0.21"
fnv = "1.0"
tokio = { version = "1.0", features = ["macros"] }
notify = { version = "6.1", optional = true }

[dev-dependencies]
azumi = { path = ".", features = ["test-utils"] }
trybuild = "1.0"
